  difficulty: tricky
  question: "For each employee, show their manager's full name (self-join)."
  ground_truth_sql: |
    SELECT CONCAT(e.FirstName, ' ', e.LastName)  AS employee,
           CONCAT(m.FirstName, ' ', m.LastName)  AS manager
    FROM   Employee e
    LEFT JOIN Employee m ON m.EmployeeId = e.ReportsTo
    ORDER  BY e.LastName, e.FirstName

- id: chinook_039
  database: chinook
  difficulty: tricky
  question: "Tracks that are longer than the average track length."
  ground_truth_sql: |
    SELECT Name, Milliseconds
    FROM   Track
    WHERE  Milliseconds > (SELECT AVG(Milliseconds) FROM Track)
    ORDER  BY Milliseconds DESC

- id: chinook_040
  database: chinook
  difficulty: tricky
  question: "For each genre, the share of total revenue as a percentage."
  ground_truth_sql: |
    SELECT g.Name AS genre,
           ROUND(100.0 * SUM(il.UnitPrice * il.Quantity)
                       / (SELECT SUM(UnitPrice * Quantity) FROM InvoiceLine), 2) AS pct_revenue
    FROM   Genre        g
    JOIN   Track        t  ON t.GenreId  = g.GenreId
    JOIN   InvoiceLine  il ON il.TrackId = t.TrackId
    GROUP  BY g.Name
    ORDER  BY pct_revenue DESC, g.Name
