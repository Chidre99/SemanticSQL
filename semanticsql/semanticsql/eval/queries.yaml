- id: chinook_031
  database: chinook
  difficulty: multi_join_agg
  question: "Top 10 best-selling tracks by total revenue."
  ground_truth_sql: |
    SELECT t.Name, SUM(il.UnitPrice * il.Quantity) AS revenue
    FROM   Track       t
    JOIN   InvoiceLine il ON il.TrackId = t.TrackId
    GROUP  BY t.TrackId, t.Name
    ORDER  BY revenue DESC, t.Name
    LIMIT  10

- id: chinook_032
  database: chinook
  difficulty: multi_join_agg
  question: "Which genre generated the most revenue?"
  ground_truth_sql: |
    SELECT g.Name AS genre, SUM(il.UnitPrice * il.Quantity) AS revenue
    FROM   Genre        g
    JOIN   Track        t  ON t.GenreId  = g.GenreId
    JOIN   InvoiceLine  il ON il.TrackId = t.TrackId
    GROUP  BY g.Name
    ORDER  BY revenue DESC
    LIMIT  1

- id: chinook_033
  database: chinook
  difficulty: multi_join_agg
  question: "Total revenue per year."
  ground_truth_sql: |
    SELECT YEAR(InvoiceDate) AS year, SUM(Total) AS revenue
