# SemanticSQL eval set
#
# 80 NL questions with hand-written ground-truth SQL. Distribution per DB:
#   - 8  simple lookup        (count, single-column SELECT)
#   - 12 filter + order       (WHERE + ORDER BY + LIMIT)
#   - 10 single join
#   - 6  multi-join + agg     (GROUP BY across 3+ tables)
#   - 4  tricky               (subquery, CASE, date math, self-join, NOT EXISTS)
#
# `expected_row_count` is filled in by run_eval.py on first execution against
# the ground-truth DB — that's a one-time backfill so the file becomes
# self-contained for future runs.

# ============================ PAGILA ============================

