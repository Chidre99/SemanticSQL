- id: pagila_017
  database: pagila
  difficulty: filter_order
  question: "List the 5 shortest films."
  ground_truth_sql: "SELECT title, length FROM film WHERE length IS NOT NULL ORDER BY length ASC, title LIMIT 5"

- id: pagila_018
  database: pagila
  difficulty: filter_order
  question: "How many rentals have not been returned yet?"
  ground_truth_sql: "SELECT COUNT(*) FROM rental WHERE return_date IS NULL"

- id: pagila_019
  database: pagila
  difficulty: filter_order
  question: "What was the total revenue across all payments?"
  ground_truth_sql: "SELECT SUM(amount) AS total_revenue FROM payment"

- id: pagila_020
  database: pagila
  difficulty: filter_order
  question: "List the top 10 customers by number of rentals."
  ground_truth_sql: |
    SELECT customer_id, COUNT(*) AS rental_count
    FROM   rental
    GROUP  BY customer_id
    ORDER  BY rental_count DESC, customer_id
    LIMIT  10

- id: pagila_021
  database: pagila
  difficulty: single_join
  question: "What language is the film 'ACADEMY DINOSAUR' in?"
  ground_truth_sql: |
    SELECT TRIM(l.name) AS language
    FROM   film f
    JOIN   language l ON l.language_id = f.language_id
    WHERE  f.title = 'ACADEMY DINOSAUR'

- id: pagila_022
  database: pagila
  difficulty: single_join
  question: "How many copies of each film are in inventory? List the top 10."
  ground_truth_sql: |
    SELECT f.title, COUNT(*) AS copies
    FROM   inventory i
    JOIN   film f ON f.film_id = i.film_id
    GROUP  BY f.title
    ORDER  BY copies DESC, f.title
    LIMIT  10

- id: pagila_023
  database: pagila
  difficulty: single_join
  question: "Which actors appear in the film 'ACADEMY DINOSAUR'?"
  ground_truth_sql: |
    SELECT a.first_name, a.last_name
    FROM   film_actor fa
    JOIN   actor a  ON a.actor_id = fa.actor_id
    JOIN   film  f  ON f.film_id  = fa.film_id
    WHERE  f.title = 'ACADEMY DINOSAUR'
    ORDER  BY a.last_name, a.first_name

- id: pagila_024
  database: pagila
  difficulty: single_join
  question: "How many films are in each category?"
  ground_truth_sql: |
    SELECT c.name AS category, COUNT(*) AS film_count
    FROM   film_category fc
    JOIN   category c ON c.category_id = fc.category_id
    GROUP  BY c.name
    ORDER  BY film_count DESC, c.name

- id: pagila_025
  database: pagila
  difficulty: single_join
  question: "How many rentals did each staff member process?"
  ground_truth_sql: |
    SELECT s.first_name, s.last_name, COUNT(r.rental_id) AS rentals
    FROM   staff s
    LEFT JOIN rental r ON r.staff_id = s.staff_id
    GROUP  BY s.staff_id, s.first_name, s.last_name
    ORDER  BY rentals DESC

- id: pagila_026
  database: pagila
  difficulty: single_join
  question: "List all customers in California."
  ground_truth_sql: |
    SELECT c.first_name, c.last_name, c.email
    FROM   customer c
    JOIN   address  a ON a.address_id = c.address_id
    WHERE  a.district = 'California'
    ORDER  BY c.last_name, c.first_name

- id: pagila_027
  database: pagila
  difficulty: single_join
  question: "What is the total amount each customer has paid? Show the top 10."
  ground_truth_sql: |
    SELECT c.customer_id, c.first_name, c.last_name, SUM(p.amount) AS total_paid
    FROM   customer c
    JOIN   payment  p ON p.customer_id = c.customer_id
    GROUP  BY c.customer_id, c.first_name, c.last_name
    ORDER  BY total_paid DESC
    LIMIT  10

- id: pagila_028
  database: pagila
  difficulty: single_join
  question: "How many films are in the 'Comedy' category?"
  ground_truth_sql: |
    SELECT COUNT(*) AS film_count
    FROM   film_category fc
    JOIN   category c ON c.category_id = fc.category_id
    WHERE  c.name = 'Comedy'

- id: pagila_029
  database: pagila
  difficulty: single_join
  question: "List the 10 most rented films."
  ground_truth_sql: |
    SELECT f.title, COUNT(*) AS rental_count
    FROM   rental    r
    JOIN   inventory i ON i.inventory_id = r.inventory_id
    JOIN   film      f ON f.film_id      = i.film_id
    GROUP  BY f.title
    ORDER  BY rental_count DESC, f.title
    LIMIT  10

- id: pagila_030
  database: pagila
  difficulty: single_join
  question: "Total revenue per store."
  ground_truth_sql: |
    SELECT s.store_id, SUM(p.amount) AS revenue
    FROM   payment  p
    JOIN   staff    s ON s.staff_id = p.staff_id
    GROUP  BY s.store_id
    ORDER  BY revenue DESC

- id: pagila_031
  database: pagila
  difficulty: multi_join_agg
  question: "Average rental rate per category, ordered by rate descending."
  ground_truth_sql: |
    SELECT c.name AS category, AVG(f.rental_rate) AS avg_rental_rate
    FROM   category   c
    JOIN   film_category fc ON fc.category_id = c.category_id
    JOIN   film       f    ON f.film_id     = fc.film_id
    GROUP  BY c.name
    ORDER  BY avg_rental_rate DESC, c.name

- id: pagila_032
  database: pagila
  difficulty: multi_join_agg
  question: "Which country generated the most revenue?"
  ground_truth_sql: |
    SELECT co.country, SUM(p.amount) AS revenue
    FROM   payment  p
    JOIN   customer cu ON cu.customer_id = p.customer_id
    JOIN   address  a  ON a.address_id   = cu.address_id
    JOIN   city     ci ON ci.city_id     = a.city_id
    JOIN   country  co ON co.country_id  = ci.country_id
    GROUP  BY co.country
    ORDER  BY revenue DESC
    LIMIT  1

- id: pagila_033
  database: pagila
  difficulty: multi_join_agg
  question: "Top 5 actors who have appeared in the most films."
  ground_truth_sql: |
    SELECT a.first_name, a.last_name, COUNT(*) AS film_count
    FROM   actor      a
    JOIN   film_actor fa ON fa.actor_id = a.actor_id
    GROUP  BY a.actor_id, a.first_name, a.last_name
    ORDER  BY film_count DESC, a.last_name
    LIMIT  5

- id: pagila_034
  database: pagila
  difficulty: multi_join_agg
  question: "Average film length per category."
  ground_truth_sql: |
    SELECT c.name AS category, AVG(f.length) AS avg_length
    FROM   category   c
    JOIN   film_category fc ON fc.category_id = c.category_id
    JOIN   film       f    ON f.film_id     = fc.film_id
    GROUP  BY c.name
    ORDER  BY avg_length DESC, c.name

- id: pagila_035
  database: pagila
  difficulty: multi_join_agg
  question: "Revenue by month in 2007."
  ground_truth_sql: |
    SELECT DATE_TRUNC('month', p.payment_date) AS month, SUM(p.amount) AS revenue
    FROM   payment p
    WHERE  EXTRACT(YEAR FROM p.payment_date) = 2007
    GROUP  BY month
    ORDER  BY month

- id: pagila_036
  database: pagila
  difficulty: multi_join_agg
  question: "Top 5 cities by customer count."
  ground_truth_sql: |
    SELECT ci.city, COUNT(*) AS customers
    FROM   customer cu
    JOIN   address  a  ON a.address_id = cu.address_id
    JOIN   city     ci ON ci.city_id   = a.city_id
    GROUP  BY ci.city
    ORDER  BY customers DESC, ci.city
    LIMIT  5

- id: pagila_037
  database: pagila
  difficulty: tricky
  question: "For each film rating, what percentage of films are longer than 2 hours?"
  ground_truth_sql: |
    SELECT rating,
           ROUND(100.0 * SUM(CASE WHEN length > 120 THEN 1 ELSE 0 END) / COUNT(*), 2) AS pct_over_2h
    FROM   film
    GROUP  BY rating
    ORDER  BY rating

- id: pagila_038
  database: pagila
  difficulty: tricky
  question: "Find customers who have never made a payment."
  ground_truth_sql: |
    SELECT c.customer_id, c.first_name, c.last_name
    FROM   customer c
    WHERE  NOT EXISTS (SELECT 1 FROM payment p WHERE p.customer_id = c.customer_id)
    ORDER  BY c.customer_id

- id: pagila_039
  database: pagila
  difficulty: tricky
  question: "Find films that have never been rented."
  ground_truth_sql: |
    SELECT f.film_id, f.title
    FROM   film f
    WHERE  NOT EXISTS (
        SELECT 1
        FROM   inventory i
        JOIN   rental    r ON r.inventory_id = i.inventory_id
        WHERE  i.film_id = f.film_id
    )
    ORDER  BY f.title

- id: pagila_040
  database: pagila
  difficulty: tricky
  question: "Average days between rental and return per film, top 5 longest."
  ground_truth_sql: |
    SELECT f.title,
           AVG(EXTRACT(EPOCH FROM (r.return_date - r.rental_date)) / 86400.0) AS avg_days
    FROM   rental    r
    JOIN   inventory i ON i.inventory_id = r.inventory_id
    JOIN   film      f ON f.film_id      = i.film_id
    WHERE  r.return_date IS NOT NULL
    GROUP  BY f.title
    ORDER  BY avg_days DESC
    LIMIT  5

